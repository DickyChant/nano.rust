# Muon channel overlay for 2024 campaigns.
#
# This card intentionally stays small:
# - `era` selects the JEC/JER and PU campaign blocks from `base.yaml`
# - `nano_version` selects NanoAOD-vs-branch conventions such as the AK4
#   b-tag branch and working points
# - `required_triggers` defines the trigger OR used for `passMuTrig`
#
# Any of these can still be overridden from the command line with `--set`.

extends: base.yaml

era: "2024"
nano_version: "V15"

required_triggers:
  - HLT_Mu50
  - HLT_TkMu50
