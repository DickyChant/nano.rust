# nano.rust — Rust rewrite of the nano.cpp NanoAOD analysis framework.
# The C++ tree (CMake) still builds alongside this during the migration;
# see docs/rust-migration.md. The forked ROOT I/O crate lives at
# external/alice-rs/root-io and is brought in by nano-io once it builds standalone.
[workspace]
resolver = "2"
members = ["crates/*"]
exclude = ["external/alice-rs/root-io"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MPL-2.0"
repository = "https://github.com/DickyChant/nano.rust"

[workspace.dependencies]
nano-core = { path = "crates/nano-core" }
nano-io = { path = "crates/nano-io" }
# Brought online after the root-io fork builds standalone as a path dependency:
# root-io = { path = "external/alice-rs/root-io" }
