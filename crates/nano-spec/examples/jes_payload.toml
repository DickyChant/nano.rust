[analysis]
name = "jes_payload"
year = "Run2018"

[[correction]]
name = "jes_total"
kind = "jes"
file = "../nano-spec/tests/data/jes_uncertainty.json"
correction = "synthetic_jes_uncertainty"
collection = "good_jet"
attr = "pt"
inputs = [
  { name = "eta", from = "eta" },
  { name = "pt", from = "pt" },
]

[objects.good_jet]
source = "Jet"
cuts = [
  "pt > 30 GeV",
  "abs(eta) < 5.0",
]

[regions.signal]
require = ["count(good_jet) >= 1"]

[[outputs]]
name = "n_good_jet"
expr = "count(good_jet)"

[[outputs]]
name = "leading_jet_pt"
expr = "leading(good_jet).pt"

[[outputs]]
name = "ht"
expr = "sum(good_jet.pt)"

[[histogram]]
name = "n_good_jet_hist"
expr = "count(good_jet)"
bins = 5
range = [0.0, 5.0]
