[analysis]
name = "multijet_ht"
year = "Run2012"

[objects.good_jet]
source = "Jet"
cuts = [
  "pt > 30 GeV",
  "abs(eta) < 2.5",
]

[regions.control]
require = [
  "count(good_jet) >= 4",
  "sum(good_jet.pt) > 500 GeV",
  "leading(good_jet).pt > 100 GeV",
]

[[outputs]]
name = "ht"
expr = "sum(good_jet.pt)"

[[outputs]]
name = "n_selected_jets"
expr = "count(good_jet)"

[[outputs]]
name = "leading_jet_pt"
expr = "leading(good_jet).pt"

[[histogram]]
name = "ht"
expr = "sum(good_jet.pt)"
bins = 50
range = [500.0, 3000.0]
