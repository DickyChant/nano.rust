[analysis]
name = "higgs4l_2e2mu"
year = "Run2012"

[objects.good_electron]
source = "Electron"
cuts = []

[objects.good_muon]
source = "Muon"
cuts = []

[derived.z_el]
kind = "combine"
items = ["good_electron", "good_electron"]
filters = ["dR >= 0.02"]

[derived.z_mu]
kind = "combine"
items = ["good_muon", "good_muon"]
filters = ["dR >= 0.02"]

[derived.h]
kind = "combine"
items = ["z_mu", "z_el"]

[regions.signal]
require = [
  "count(good_electron) >= 2",
  "count(good_muon) >= 2",
  "all(good_electron, abs(eta) < 2.5)",
  "all(good_muon, abs(eta) < 2.4)",
  "either_pair_pt(good_muon, good_electron, 20 GeV, 10 GeV)",
  "all(good_electron, abs(pfRelIso03_all) < 0.40)",
  "all(good_muon, abs(pfRelIso04_all) < 0.40)",
  "all(good_electron, sqrt(dxy*dxy + dz*dz) / sqrt(dxyErr*dxyErr + dzErr*dzErr) < 4.0)",
  "all(good_muon, sqrt(dxy*dxy + dz*dz) / sqrt(dxyErr*dxyErr + dzErr*dzErr) < 4.0)",
  "all(good_electron, abs(dxy) < 0.5)",
  "all(good_muon, abs(dxy) < 0.5)",
  "all(good_electron, abs(dz) < 1.0)",
  "all(good_muon, abs(dz) < 1.0)",
  "sum(good_electron.charge) == 0",
  "sum(good_muon.charge) == 0",
  "closest_mass(z_mu, z_el, 91.2 GeV) > 40 GeV",
  "closest_mass(z_mu, z_el, 91.2 GeV) < 120 GeV",
  "other_mass(z_mu, z_el, 91.2 GeV) > 12 GeV",
  "other_mass(z_mu, z_el, 91.2 GeV) < 120 GeV",
]

[[outputs]]
name = "z1_mass"
expr = "closest_mass(z_mu, z_el, 91.2 GeV)"

[[outputs]]
name = "z2_mass"
expr = "other_mass(z_mu, z_el, 91.2 GeV)"

[[outputs]]
name = "h_mass"
expr = "h.mass"
