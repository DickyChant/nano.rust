name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      NANO_HTTP_INSECURE: "1"
      NANO_BENCH_N: "100"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust tests
        run: cargo test

      - name: Rust tests with HTTP byte-range source
        run: cargo test --features http

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependencies
        run: python -m pip install --upgrade pip uproot awkward numpy fsspec aiohttp

      - name: uproot interop and benchmark
        run: python scripts/bench_vs_uproot.py
