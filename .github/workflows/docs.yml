name: docs

# Build the project site (landing page + blog + rustdoc API) and publish to Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rustdoc (all crates, all features)
        run: cargo doc --no-deps --all-features --workspace
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Site dependencies
        run: python -m pip install --upgrade pip markdown
      - name: Assemble site (landing + blog + api)
        run: python scripts/build_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
